name: Reliability CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Type check
        run: bun run types

      - name: Run required CI gates and full suite
        run: bun run test:ci

      - name: Enforce runtime coverage thresholds
        if: matrix.node-version == '24'
        run: bun run test:coverage

      - name: Repeat reliability suite for flake detection
        if: matrix.node-version == '24'
        run: bun run test:reliability:stress
